services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: security-ai-lab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-security_ai_lab}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: security-ai-lab-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: security-ai-lab-backend
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000
      API_PREFIX: /api/v1
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/security_ai_lab
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me
      JWT_REFRESH_SECRET: change-me-too
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 7d
      DEFAULT_LLM_PROVIDER: qwen
      DEFAULT_LLM_MODEL: qwen2.5-coder
      LOCAL_MODEL_BASE_URL: http://host.docker.internal:11434/v1
      QDRANT_URL: http://host.docker.internal:6333
      EMBEDDING_DIMENSION: 8
      STORAGE_PATH: ../storage
      UPLOADS_PATH: ../uploads
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./storage:/app/storage

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: security-ai-lab-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
  redis-data:
